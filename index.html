<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Hub Ultimate 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-surface: #151f32;
            --text-main: #f9fafb;
            --border-color: #1f2937;
        }
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="flex h-screen w-screen items-center justify-center p-4 overflow-hidden">

    <div id="calc-gate" class="w-full max-w-[380px] rounded-3xl bg-white p-6 shadow-2xl text-gray-800 transition-all duration-500">
        <div id="calc-screen" class="mb-4 h-20 rounded-2xl bg-gray-100 p-4 text-right text-3xl font-bold flex items-center justify-end overflow-hidden">0</div>
        <div class="grid grid-cols-4 gap-3">
            <button onclick="pressCalc('C')" class="h-16 rounded-2xl bg-gray-200 hover:bg-gray-300 text-xl font-bold transition">C</button>
            <button onclick="pressCalc('/')" class="h-16 rounded-2xl bg-gray-200 hover:bg-gray-300 text-xl font-bold transition">/</button>
            <button onclick="pressCalc('*')" class="h-16 rounded-2xl bg-gray-200 hover:bg-gray-300 text-xl font-bold transition">*</button>
            <button onclick="pressCalc('-')" class="h-16 rounded-2xl bg-gray-200 hover:bg-gray-300 text-xl font-bold transition">-</button>
            
            <button onclick="pressCalc('7')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">7</button>
            <button onclick="pressCalc('8')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">8</button>
            <button onclick="pressCalc('9')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">9</button>
            <button onclick="pressCalc('+')" class="h-16 rounded-2xl bg-gray-200 hover:bg-gray-300 text-xl font-bold transition">+</button>
            
            <button onclick="pressCalc('4')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">4</button>
            <button onclick="pressCalc('5')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">5</button>
            <button onclick="pressCalc('6')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">6</button>
            <button onclick="pressCalc('=')" class="h-16 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold transition col-span-1 row-span-2 flex items-center justify-center">=</button>
            
            <button onclick="pressCalc('1')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">1</button>
            <button onclick="pressCalc('2')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">2</button>
            <button onclick="pressCalc('3')" class="h-16 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition">3</button>
            
            <button onclick="pressCalc('0')" class="p-4 rounded-2xl bg-gray-100 hover:bg-gray-200 text-xl font-bold transition col-span-3 text-left pl-7">0</button>
        </div>
        <p class="text-[11px] text-center text-gray-400 mt-4 tracking-wide font-medium">DIGITA IL CODICE DI ACCESSO E PREMI =</p>
    </div>

    <div id="main-platform" class="hidden w-full h-full flex overflow-hidden opacity-0 transition-all duration-700">
        
        <div class="w-80 border-r flex flex-col p-4 space-y-4 overflow-y-auto" style="background-color: var(--bg-surface); border-color: var(--border-color)">
            <div class="flex items-center space-x-3 p-2 border-b" style="border-color: var(--border-color)">
                <span id="player-icon" class="text-3xl">👑</span>
                <div>
                    <h3 id="player-name" class="font-black text-lg text-white">Player1</h3>
                    <p class="text-xs opacity-75 text-gray-400">🪙 <span id="coins-display">500</span> | 🏆 <span id="trophies-display">0</span></p>
                </div>
            </div>
            
            <div class="flex-1 space-y-2">
                <div class="text-xs font-bold text-gray-400 tracking-wider">UTENTI ONLINE REAL-TIME</div>
                <div id="friends-list" class="space-y-2 text-sm">
                    </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="h-16 border-b flex items-center justify-between px-6" style="background-color: var(--bg-surface); border-color: var(--border-color)">
                <div class="flex space-x-6 text-sm font-bold">
                    <button onclick="switchTab('games')" class="text-blue-500">LOBBY GIOCHI</button>
                    <button onclick="switchTab('shop')" class="text-gray-400 hover:text-white transition">SHOP MASSIVO</button>
                    <button onclick="switchTab('trophy')" class="text-gray-400 hover:text-white transition">TROPHY ROAD</button>
                </div>
                <button onclick="claimBonus()" class="text-xs bg-amber-500 hover:bg-amber-400 text-black font-black px-4 py-2 rounded-full transition">DAILY BONUS</button>
            </div>

            <div id="tab-content" class="flex-1 p-6 overflow-y-auto">
                <div id="games-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <p class="text-gray-400 text-sm col-span-full">Pronto per ricevere la lista dei giochi...</p>
                </div>
            </div>
        </div>

    </div>

    <script>
        let calcInput = '';
        
        function pressCalc(val) {
            let screen = document.getElementById('calc-screen');
            if (val === 'C') {
                calcInput = '';
                screen.innerText = '0';
            } else if (val === '=') {
                if (calcInput === '67') {
                    // Trigger d'accesso superato: Scomparsa cinematica della calcolatrice
                    let gate = document.getElementById('calc-gate');
                    let platform = document.getElementById('main-platform');
                    
                    gate.classList.add('opacity-0', 'scale-90');
                    setTimeout(() => {
                        gate.remove(); // Elimina la calcolatrice dallo schermo
                        platform.classList.remove('hidden');
                        setTimeout(() => {
                            platform.classList.add('opacity-100');
                        }, 50);
                    }, 500);
                } else {
                    try {
                        calcInput = eval(calcInput).toString();
                        screen.innerText = calcInput;
                    } catch {
                        screen.innerText = 'Error';
                        calcInput = '';
                    }
                }
            } else {
                calcInput += val;
                screen.innerText = calcInput;
            }
        }

        function switchTab(tabName) {
            console.log("Cambio scheda in: " + tabName);
            // La logica per gestire lo shop e i trofei arriverà nei prossimi file
        }

        function claimBonus() {
            alert("Bonus controllato! Se hai 0 monete riceverai +100 GreyCoins.");
        }
    </script>
</body>
</html>
