<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Snake - Gaming Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; color: #f9fafb; font-family: system-ui, sans-serif; }
        canvas { background-color: #0f172a; border: 2px solid #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="flex flex-col h-screen w-screen items-center justify-center p-4">

    <div class="w-full max-w-[450px] bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl flex flex-col items-center">
        
        <div class="w-full flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black text-emerald-500 tracking-wider">🐍 RETRO SNAKE</h1>
            <a href="index.html" class="text-xs bg-slate-800 hover:bg-slate-700 font-bold px-3 py-2 rounded-xl transition">⬅️ HUB</a>
        </div>

        <div class="w-full flex justify-between items-center mb-4 text-sm font-bold text-gray-400 bg-slate-950/50 px-4 py-2 rounded-xl border border-slate-800">
            <div>Punti: <span id="score" class="text-emerald-400 text-lg">0</span></div>
            <div>Premi: <span id="reward" class="text-amber-400 text-lg">0</span> 🪙</div>
        </div>

        <canvas id="gameCanvas" width="300" height="300" class="rounded-2xl mb-4"></canvas>

        <div class="grid grid-cols-3 gap-2 w-48 mb-4 lg:hidden">
            <div></div>
            <button onclick="changeDirection('UP')" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 h-12 rounded-xl font-bold text-xl">▲</button>
            <div></div>
            <button onclick="changeDirection('LEFT')" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 h-12 rounded-xl font-bold text-xl">◀</button>
            <button onclick="resetGame()" class="bg-slate-950 text-[10px] font-black rounded-xl uppercase tracking-wider text-gray-500">Reset</button>
            <button onclick="changeDirection('RIGHT')" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 h-12 rounded-xl font-bold text-xl">▶</button>
            <div></div>
            <button onclick="changeDirection('DOWN')" class="bg-slate-800 hover:bg-slate-700 active:bg-emerald-600 h-12 rounded-xl font-bold text-xl">▼</button>
        </div>

        <button onclick="resetGame()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 font-black text-sm rounded-xl transition tracking-wider hidden lg:block">
            AVVIA / RESTART
        </button>
        <p class="text-[10px] text-gray-500 text-center mt-2 hidden lg:block">Usa le FRECCE della tastiera per muoverti</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const gridSize = 15;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let rewardCoins = 0;
        let gameInterval;
        let isGameOver = false;

        // Carica le monete correnti dall'Hub centrale
        let globalCoins = localStorage.getItem('sys_coins') ? parseInt(localStorage.getItem('sys_coins')) : 500;

        // Ascolta la tastiera su PC
        document.addEventListener("keydown", handleKeyDown);

        function handleKeyDown(e) {
            if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
            if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
            if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
            if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
        }

        function changeDirection(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -1; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 1; }
            if (dir === 'LEFT' && dx === 0) { dx = -1; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = 1; dy = 0; }
        }

        function drawGame() {
            // Muovi la testa del serpente
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Controllo collisioni con i muri
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return gameOver();
            }

            // Controllo collisioni con se stesso
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    return gameOver();
                }
            }

            snake.unshift(head);

            // Controllo se il serpente mangia il cibo
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                rewardCoins += 5; // Guadagni 5 monete per ogni cibo mangiato
                document.getElementById("score").innerText = score;
                document.getElementById("reward").innerText = rewardCoins;
                
                // Aggiorna e salva istantaneamente nel portafoglio globale dell'Hub
                globalCoins += 5;
                localStorage.setItem('sys_coins', globalCoins);
                localStorage.setItem('greyCoins', globalCoins);

                generateFood();
            } else {
                snake.pop();
            }

            // Pulisci il canvas ad ogni frame
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Disegna il cibo (Neon rosso)
            ctx.fillStyle = "#ef4444";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ef4444";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // Disegna il serpente (Neon verde)
            ctx.fillStyle = "#10b981";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#10b981";
            snake.forEach((part, index) => {
                // La testa è leggermente più chiara
                ctx.fillStyle = index === 0 ? "#34d399" : "#10b981";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0; // Reset ombre per stabilità grafica
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            
            // Assicurati che il cibo non nasca sopra il corpo del serpente
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function gameOver() {
            clearInterval(gameInterval);
            isGameOver = true;
            ctx.fillStyle = "rgba(15, 23, 42, 0.85)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#f3f4f6";
            ctx.font = "bold 20px system-ui";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
            
            ctx.fillStyle = "#10b981";
            ctx.font = "12px system-ui";
            ctx.fillText(`Hai salvato +${rewardCoins} monete nell'Hub!`, canvas.width / 2, canvas.height / 2 + 15);
        }

        function resetGame() {
            clearInterval(gameInterval);
            snake = [{ x: 10, y: 10 }];
            dx = 1;
            dy = 0;
            score = 0;
            rewardCoins = 0;
            isGameOver = false;
            document.getElementById("score").innerText = score;
            document.getElementById("reward").innerText = rewardCoins;
            generateFood();
            gameInterval = setInterval(drawGame, 100); // Velocità di gioco stabile
        }

        // Avvia una partita in automatico all'apertura del file
        resetGame();
    </script>
</body>
</html>
